// \u2500\u2500\u2500 Utilities \u2500\u2500\u2500
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function getXP(d,s){return(d===1?10:d===2?25:50)+Math.min(s,5)*5;}
function getLevel(x){
  if(x<50)return{level:1,title:"Lab Intern",next:50,prev:0};
  if(x<150)return{level:2,title:"Bench Scientist",next:150,prev:50};
  if(x<350)return{level:3,title:"Protocol Pro",next:350,prev:150};
  if(x<600)return{level:4,title:"Assay Expert",next:600,prev:350};
  if(x<1000)return{level:5,title:"Single-Cell Wizard",next:1000,prev:600};
  return{level:6,title:"Protocol Master \u{1F9EC}",next:null,prev:1000};
}
