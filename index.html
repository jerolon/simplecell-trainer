<!-- ═══ MAIN APP (React components) ═══ -->
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const e = React.createElement;

// ─── Utilities ──────────────────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function getXP(d,s){return(d===1?10:d===2?25:50)+Math.min(s,5)*5;}
function getLevel(x){
  if(x<50)return{level:1,title:"Lab Intern",next:50,prev:0};
  if(x<150)return{level:2,title:"Bench Scientist",next:150,prev:50};
  if(x<350)return{level:3,title:"Protocol Pro",next:350,prev:150};
  if(x<600)return{level:4,title:"Assay Expert",next:600,prev:350};
  if(x<1000)return{level:5,title:"Single-Cell Wizard",next:1000,prev:600};
  return{level:6,title:"Protocol Master \u{1F9EC}",next:null,prev:1000};
}

// ─── Reagent text linking ───────────────────────────────────────────
// Scans a string for REAGENT_DB keys and returns React elements with
// clickable blue terms that open the sidebar.
function renderLinkedText(text, onTap) {
  if (typeof REAGENT_DB === 'undefined') return [text]; // fallback if no reagent data
  const keys = Object.keys(REAGENT_DB).sort((a,b) => b.length - a.length);
  const pattern = new RegExp("\\b(" + keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join("|") + ")\\b", "g");
  const parts = []; let last = 0; let match;
  while ((match = pattern.exec(text)) !== null) {
    if (match.index > last) parts.push(text.slice(last, match.index));
    const term = match[1];
    parts.push(e('span', {
      key: match.index, onClick: (ev) => { ev.stopPropagation(); onTap(term); },
      style: { color:"#60a5fa", borderBottom:"1px dashed #60a5fa55", cursor:"pointer", fontWeight:600 }
    }, term));
    last = pattern.lastIndex;
  }
  if (last < text.length) parts.push(text.slice(last));
  return parts;
}

// ─── Reagent Sidebar ────────────────────────────────────────────────

    zIndex:200,overflowY:"auto",padding:"20px",animation:"slideIn 0.2s ease",
    boxShadow:"-8px 0 30px rgba(0,0,0,0.5)"}},
    e('button',{onClick:onClose,style:{position:"absolute",top:12,right:12,background:"none",
      border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,color:"#94a3b8",
      padding:"4px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}},"\u2715 Close"),
    e('div',{style:{marginBottom:16,paddingRight:60}},
      e('div',{style:{fontSize:20,fontWeight:700,color:"#60a5fa"}},term),
      e('div',{style:{fontSize:13,color:"#94a3b8",marginTop:2}},r.fullName)),
    r.link && e('a',{href:r.link,target:"_blank",rel:"noopener noreferrer",

        textDecoration:"none",border:"1px solid rgba(96,165,250,0.25)",borderRadius:6,
        padding:"5px 12px",background:"rgba(96,165,250,0.08)"}},
      "\u{1F517} More info \u2192"),
    r.image && e('img',{src:r.image,alt:term,style:{width:"100%",borderRadius:8,

    r.handling.map(function(h,i){ return e('div',{key:i,style:{fontSize:12,color:"#fde68a",lineHeight:1.6,marginBottom:4}},"\u2022 "+h); }),
    r.scaling && e('div',{style:{marginTop:16}},
      e('div',{style:{fontSize:11,fontWeight:700,color:"#818cf8",letterSpacing:1.5,marginBottom:8}},r.scaling.title),
      e('table',{style:{width:"100%",fontSize:11,borderCollapse:"collapse"}},

          return e('th',{key:i,style:{padding:"6px 8px",textAlign:"left",color:"#94a3b8",borderBottom:"1px solid rgba(255,255,255,0.1)",fontWeight:600}},c);}))),
        e('tbody',null,r.scaling.rows.map(function(row,i){
          return e('tr',{key:i},row.map(function(c,j){
            return e('td',{key:j,style:{padding:"6px 8px",color:j===0?"#e2e8f0":"#c7d2fe",fontFamily:j>0?"monospace":"inherit",borderBottom:"1px solid rgba(255,255,255,0.04)"}},c);}));})))));
}

// ─── Sub-components ─────────────────────────────────────────────────
function ThermoBox({prog}){if(!prog)return null;return e('div',{style:{background:"rgba(251,146,60,0.06)",border:"1px solid rgba(251,146,60,0.18)",borderRadius:8,padding:"10px 14px",marginBottom:12}},e('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},e('span',{style:{fontSize:11,fontWeight:700,color:"#fb923c",letterSpacing:1.5}},"\u{1F321}\uFE0F "+prog.name),e('span',{style:{fontSize:10,color:"#94a3b8",fontFamily:"monospace"}},"Vol: "+prog.vol+" \u00B7 ~"+prog.time)),e('div',{style:{fontSize:12,color:"#fde68a",fontFamily:"monospace",lineHeight:1.7,whiteSpace:"pre-wrap"}},prog.steps));}

function MasterMixTable({mixes}){if(!mixes||!mixes.length)return null;return e('div',{style:{marginBottom:12}},mixes.map(function(m,i){return e('div',{key:i,style:{background:"rgba(99,102,241,0.06)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:8,padding:"10px 14px",marginBottom:8}},e('div',{style:{fontSize:11,fontWeight:700,color:"#818cf8",letterSpacing:1,marginBottom:6}},"\u{1F9EA} "+m.name),e('div',{style:{fontSize:11,color:"#c7d2fe",fontFamily:"monospace",lineHeight:1.8}},e('div',null,"1\u00D7: "+m.per1),e('div',null,"8\u00D7: "+m.per8),m.note&&e('div',{style:{color:"#94a3b8",fontStyle:"italic",marginTop:4}},m.note)));}));}

function HintButton({hint}){const[s,setS]=useState(false);return e('div',{style:{marginBottom:16}},e('button',{onClick:function(){setS(!s);},style:{background:s?"rgba(251,191,36,0.1)":"rgba(255,255,255,0.04)",border:"1px solid "+(s?"rgba(251,191,36,0.3)":"rgba(255,255,255,0.1)"),borderRadius:8,padding:"8px 14px",fontSize:12,color:s?"#fbbf24":"#94a3b8",cursor:"pointer",fontFamily:"inherit",fontWeight:500}},"\u{1F4A1} "+(s?"Hide Hint":"Show Hint")),s&&e('div',{style:{marginTop:8,padding:"10px 14px",background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:8,fontSize:13,color:"#fde68a",lineHeight:1.6}},hint));}

// StepCard — renders images, linked reagent text, and "Test me" button
function StepCard({step,isExpanded,onToggle,onTestStep,onTap}){
  return e('div',{style:{background:isExpanded?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)",border:"1px solid "+(isExpanded?step.color+"55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"16px 20px",cursor:"pointer",transition:"all 0.3s",marginBottom:8},onClick:onToggle},
    e('div',{style:{display:"flex",alignItems:"center",gap:12}},
      e('span',{style:{fontSize:24}},step.icon),
      e('div',{style:{flex:1}},
        e('div',{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},

          e('span',{style:{fontSize:10,padding:"2px 8px",borderRadius:99,background:step.phase==="pre"?"rgba(74,222,128,0.15)":"rgba(251,146,60,0.15)",color:step.phase==="pre"?"#4ade80":"#fb923c",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}},step.phase+"-pcr")),
        e('div',{style:{fontWeight:600,fontSize:16,color:"#e2e8f0",marginTop:2}},step.name)),
      e('div',{style:{textAlign:"right"}},
        e('div',{style:{fontSize:12,color:"#94a3b8",fontFamily:"monospace"}},step.duration),
        e('div',{style:{fontSize:18,color:"#64748b",transform:isExpanded?"rotate(180deg)":"rotate(0)",transition:"transform 0.2s"}},"\u25BE"))),
    !isExpanded&&e('div',{style:{marginTop:8,fontSize:13,color:"#94a3b8",lineHeight:1.5}},step.summary),
    isExpanded&&e('div',{style:{marginTop:16},onClick:function(ev){ev.stopPropagation();}},
      e('div',{style:{fontSize:13,color:"#cbd5e1",lineHeight:1.7,marginBottom:12}},step.summary),
      e(ThermoBox,{prog:step.thermoProgram}),
      e(MasterMixTable,{mixes:step.masterMixes}),
      step.reagentTable&&e('div',{style:{marginBottom:12}},
        e('div',{style:{fontSize:11,fontWeight:700,color:"#94a3b8",letterSpacing:1.5,marginBottom:6}},step.reagentTable.title),
        e('table',{style:{width:"100%",fontSize:11,borderCollapse:"collapse"}},e('tbody',null,step.reagentTable.rows.map(function(r,i){return e('tr',{key:i,style:{borderBottom:"1px solid rgba(255,255,255,0.05)"}},r.map(function(c,j){return e('td',{key:j,style:{padding:"6px 8px",color:j===0?"#e2e8f0":"#94a3b8",fontWeight:j===0?600:400,fontFamily:j===1?"monospace":"inherit"}},c);}));})))),
      step.details.map(function(sec,si){return e('div',{key:si,style:{marginBottom:16}},
        e('div',{style:{fontSize:11,fontWeight:700,color:step.color,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}},(sec.sub?sec.sub+". ":"")+sec.title),
        sec.image&&e('img',{src:sec.image,alt:sec.title,style:{width:"100%",borderRadius:8,marginBottom:12,border:"1px solid rgba(255,255,255,0.1)"}}),
        sec.steps.map(function(s,i){return e('div',{key:i,style:{display:"flex",gap:10,marginBottom:6,fontSize:13,color:"#e2e8f0",lineHeight:1.6}},
          e('span',{style:{color:step.color,fontWeight:700,fontFamily:"monospace",fontSize:11,minWidth:20,paddingTop:2}},String(i+1).padStart(2,"0")),
          e('span',null,renderLinkedText(s, onTap)));}));}),
      step.criticalNotes.length>0&&e('div',{style:{background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:8,padding:"12px 16px"}},
        e('div',{style:{fontSize:11,fontWeight:700,color:"#fbbf24",letterSpacing:1.5,marginBottom:6}},"\u26A0 CRITICAL NOTES"),
        step.criticalNotes.map(function(n,i){return e('div',{key:i,style:{fontSize:12,color:"#fde68a",lineHeight:1.6,marginBottom:4}},"\u2022 "+n);})),
      e('button',{onClick:function(){onTestStep(step.id);},style:{marginTop:16,width:"100%",padding:"12px",background:"linear-gradient(135deg,"+step.color+"22,"+step.color+"11)",border:"1px solid "+step.color+"44",borderRadius:10,color:step.color,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",letterSpacing:0.5}},"\u26A1 Test me on Step "+step.id)));
}

function QuizQuestion({question,options,onAnswer,answered,selectedIdx,correctIdx,hint}){
  return e('div',null,
    e('div',{style:{fontSize:17,fontWeight:600,color:"#f1f5f9",lineHeight:1.5,marginBottom:12}},question),
    !answered&&e(HintButton,{hint:hint}),
    e('div',{style:{display:"flex",flexDirection:"column",gap:10}},options.map(function(o,i){
      var bg="rgba(255,255,255,0.04)",bd="rgba(255,255,255,0.1)",tc="#e2e8f0";
      if(answered){if(i===correctIdx){bg="rgba(74,222,128,0.15)";bd="#4ade80";tc="#4ade80";}else if(i===selectedIdx){bg="rgba(239,68,68,0.15)";bd="#ef4444";tc="#ef4444";}}
      return e('button',{key:i,onClick:function(){if(!answered)onAnswer(i);},disabled:answered,style:{background:bg,border:"1.5px solid "+bd,borderRadius:10,padding:"14px 18px",cursor:answered?"default":"pointer",textAlign:"left",fontSize:14,color:tc,fontWeight:500,fontFamily:"inherit",opacity:answered&&i!==correctIdx&&i!==selectedIdx?0.4:1}},
        e('span',{style:{fontFamily:"monospace",marginRight:10,opacity:0.5,fontSize:12}},String.fromCharCode(65+i)),o);
    })));
}

function OrderingChallenge({challenge,onComplete}){
  const[items,setItems]=useState(function(){return shuffle(challenge.items);});
  const[done,setDone]=useState(false);
  const[ok,setOk]=useState(false);
  var mv=function(f,t){var n=[...items];var m=n.splice(f,1)[0];n.splice(t,0,m);setItems(n);};
  var go=function(){var c=items.every(function(it,i){return it===challenge.items[i];});setOk(c);setDone(true);setTimeout(function(){onComplete(c);},1500);};
  return e('div',null,
    e('div',{style:{fontSize:17,fontWeight:600,color:"#f1f5f9",lineHeight:1.5,marginBottom:8}},challenge.q),
    !done&&e(HintButton,{hint:challenge.hint}),
    e('div',{style:{fontSize:12,color:"#94a3b8",marginBottom:12}},"Tap arrows to reorder, then submit."),
    e('div',{style:{display:"flex",flexDirection:"column",gap:6}},items.map(function(it,i){
      var bg="rgba(255,255,255,0.04)",bd="rgba(255,255,255,0.1)";
      if(done){if(it===challenge.items[i]){bg="rgba(74,222,128,0.12)";bd="#4ade8066";}else{bg="rgba(239,68,68,0.12)";bd="#ef444466";}}
      return e('div',{key:it,style:{display:"flex",alignItems:"center",gap:8,background:bg,border:"1px solid "+bd,borderRadius:8,padding:"10px 14px"}},
        e('span',{style:{fontFamily:"monospace",fontSize:12,color:"#64748b",minWidth:20}},(i+1)+"."),
        e('span',{style:{flex:1,fontSize:14,color:"#e2e8f0"}},it),
        !done&&e('div',{style:{display:"flex",flexDirection:"column",gap:2}},
          e('button',{onClick:function(){if(i>0)mv(i,i-1);},style:{background:"none",border:"none",cursor:i>0?"pointer":"default",fontSize:14,color:i>0?"#94a3b8":"#334155",padding:"0 4px"}},"\u25B2"),
          e('button',{onClick:function(){if(i<items.length-1)mv(i,i+1);},style:{background:"none",border:"none",cursor:i<items.length-1?"pointer":"default",fontSize:14,color:i<items.length-1?"#94a3b8":"#334155",padding:"0 4px"}},"\u25BC")));
    })),
    !done&&e('button',{onClick:go,style:{marginTop:16,width:"100%",padding:"12px",background:"linear-gradient(135deg,#8b5cf6,#6366f1)",border:"none",borderRadius:10,color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}},"Check Order"),
    done&&e('div',{style:{marginTop:12,textAlign:"center",fontSize:15,fontWeight:700,color:ok?"#4ade80":"#ef4444"}},ok?"\u2713 Perfect order!":"\u2717 Not quite"));
}

// ─── MAIN APP ───────────────────────────────────────────────────────
function App(){
  const[mode,setMode]=useState("menu");
  const[expandedStep,setExpandedStep]=useState(null);
  const[xp,setXp]=useState(0);
  const[streak,setStreak]=useState(0);
  const[bestStreak,setBestStreak]=useState(0);
  const[totalAnswered,setTotalAnswered]=useState(0);
  const[totalCorrect,setTotalCorrect]=useState(0);
  const[quizQ,setQuizQ]=useState(null);
  const[quizOpts,setQuizOpts]=useState([]);
  const[quizCI,setQuizCI]=useState(0);
  const[answered,setAnswered]=useState(false);
  const[selIdx,setSelIdx]=useState(null);
  const[lastGain,setLastGain]=useState(0);
  const[showPop,setShowPop]=useState(false);
  const[diff,setDiff]=useState(0);
  const[isOrd,setIsOrd]=useState(false);
  const[ordCh,setOrdCh]=useState(null);
  const[asked,setAsked]=useState(new Set());
  const[studyF,setStudyF]=useState("all");
  const[lvlMsg,setLvlMsg]=useState(null);
  const[showLib,setShowLib]=useState(false);
  const[stepFilter,setStepFilter]=useState(null);
  const[sidebarTerm,setSidebarTerm]=useState(null);

  var pick=useCallback(function(){
    var qPool=QUESTIONS.filter(function(q){return(diff===0||q.diff===diff)&&(stepFilter===null||q.step.includes(stepFilter));});
    var oPool=ORDERING_CHALLENGES.filter(function(c){return(diff===0||c.diff===diff)&&(stepFilter===null||c.steps.includes(stepFilter));});
    if(qPool.length===0&&oPool.length===0){
      qPool=QUESTIONS.filter(function(q){return stepFilter===null||q.step.includes(stepFilter);});
      oPool=ORDERING_CHALLENGES.filter(function(c){return stepFilter===null||c.steps.includes(stepFilter);});
    }
    if(Math.random()<0.2&&oPool.length>0){setIsOrd(true);setOrdCh(oPool[Math.floor(Math.random()*oPool.length)]);setAnswered(false);setSelIdx(null);return;}
    if(qPool.length===0){if(oPool.length>0){setIsOrd(true);setOrdCh(oPool[Math.floor(Math.random()*oPool.length)]);setAnswered(false);setSelIdx(null);}return;}
    setIsOrd(false);
    var un=qPool.filter(function(q){return!asked.has(QUESTIONS.indexOf(q));});
    if(un.length>0)qPool=un;else setAsked(new Set());
    var q=qPool[Math.floor(Math.random()*qPool.length)];
    setAsked(function(p){return new Set(p).add(QUESTIONS.indexOf(q));});
    var ao=shuffle([q.a].concat(q.wrong));
    setQuizQ(q);setQuizOpts(ao);setQuizCI(ao.indexOf(q.a));setAnswered(false);setSelIdx(null);
  },[diff,asked,stepFilter]);

  var handleAns=function(idx){
    setSelIdx(idx);setAnswered(true);setTotalAnswered(function(t){return t+1;});
    if(idx===quizCI){var ns=streak+1;setStreak(ns);if(ns>bestStreak)setBestStreak(ns);setTotalCorrect(function(t){return t+1;});
      var g=getXP(quizQ.diff,ns);setLastGain(g);setShowPop(true);
      var ol=getLevel(xp).level;var nx=xp+g;setXp(nx);
      if(getLevel(nx).level>ol){setTimeout(function(){setLvlMsg(getLevel(nx).title);},600);setTimeout(function(){setLvlMsg(null);},3000);}
      setTimeout(function(){setShowPop(false);},1200);
    }else setStreak(0);
  };

  var handleOrdDone=function(c){
    setTotalAnswered(function(t){return t+1;});
    if(c){var ns=streak+1;setStreak(ns);if(ns>bestStreak)setBestStreak(ns);setTotalCorrect(function(t){return t+1;});var g=getXP(ordCh.diff,ns)*2;setLastGain(g);setShowPop(true);setXp(function(x){return x+g;});setTimeout(function(){setShowPop(false);},1200);}
    else setStreak(0);
    setTimeout(function(){pick();},1800);
  };

  var handleTestStep=function(stepId){setStepFilter(stepId);setAsked(new Set());setMode("quiz");};

  useEffect(function(){if(mode==="quiz")pick();},[mode,diff,stepFilter]);

  var lvl=getLevel(xp);
  var fSteps=studyF==="all"?STEPS:STEPS.filter(function(s){return s.phase===studyF;});
  var pct=lvl.next?((xp-lvl.prev)/(lvl.next-lvl.prev))*100:100;
  var stepName=stepFilter?STEPS.find(function(s){return s.id===stepFilter;})?.name:"";
  var stepQCount=stepFilter?QUESTIONS.filter(function(q){return q.step.includes(stepFilter);}).length+ORDERING_CHALLENGES.filter(function(c){return c.steps.includes(stepFilter);}).length:0;

  return e('div',{style:{minHeight:"100vh",background:"#0c0f1a",color:"#e2e8f0",fontFamily:"'Segoe UI',sans-serif"}},
    e('div',{style:{position:"fixed",inset:0,opacity:0.03,pointerEvents:"none",backgroundImage:"radial-gradient(circle at 25% 25%,#4ade80 1px,transparent 1px),radial-gradient(circle at 75% 75%,#60a5fa 1px,transparent 1px)",backgroundSize:"60px 60px"}}),
